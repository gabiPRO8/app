<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube to MP3 | Alex Valero</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="container">
      <div class="top-nav">
        <a class="nav-btn" href="/">Main Menu</a>
        <a class="nav-btn" href="/tools/remove-bg">Remove Background</a>
      </div>

      <h1>YouTube to MP3</h1>
      <p class="subtitle">Paste a YouTube URL and check conversion availability.</p>

      <form id="ytForm" class="card">
        <label for="ytUrl">YouTube URL</label>
        <input id="ytUrl" name="url" type="url" placeholder="https://www.youtube.com/watch?v=..." required />
        <p class="hint">Use only content you own or are explicitly authorized to process.</p>
        <button id="ytSubmit" type="submit">Check Tool</button>
      </form>

      <p id="ytStatus" class="status"></p>

      <footer class="legal">
        <a href="/">Home</a>
        <span>|</span>
        <a href="/tools/remove-bg">Remove Background</a>
      </footer>
    </main>

    <script>
      const form = document.getElementById('ytForm');
      const statusEl = document.getElementById('ytStatus');
      const button = document.getElementById('ytSubmit');
      let audioObjectUrl = null;

      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.classList.toggle('error', isError);
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        const url = document.getElementById('ytUrl').value.trim();
        if (!url) {
          setStatus('Please paste a valid URL.', true);
          return;
        }

        button.disabled = true;
        setStatus('Checking tool status...');

        try {
          const body = new FormData();
          body.append('url', url);

          const response = await fetch('/api/youtube-to-mp3', {
            method: 'POST',
            body,
          });

          if (!response.ok) {
            const payload = await response.json().catch(() => ({}));
            throw new Error(payload.detail || 'Request failed');
          }

          const blob = await response.blob();
          if (audioObjectUrl) {
            URL.revokeObjectURL(audioObjectUrl);
          }

          audioObjectUrl = URL.createObjectURL(blob);

          const contentDisposition = response.headers.get('content-disposition') || '';
          const match = contentDisposition.match(/filename="?([^";]+)"?/i);
          const filename = match ? match[1] : 'audio.mp3';

          const anchor = document.createElement('a');
          anchor.href = audioObjectUrl;
          anchor.download = filename;
          document.body.appendChild(anchor);
          anchor.click();
          document.body.removeChild(anchor);

          setStatus('MP3 generated. Download should start automatically.');
        } catch (error) {
          setStatus(error.message || 'Unexpected error', true);
        } finally {
          button.disabled = false;
        }
      });
    </script>
  </body>
</html>
