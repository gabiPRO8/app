<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InternetOfTools</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="container home-shell">
      <header class="hero card">
        <img class="hero-logo" src="/static/internet-of-tools-logo.svg" alt="Internet Of Tools 2000" />
        <p class="hero-kicker">Tool Hub</p>
        <p class="subtitle">A growing collection of practical tools. Pick one and start immediately.</p>
      </header>

      <section class="tools-grid">
        <article class="card tool-card previewable">
          <h2>Remove Background Image</h2>
          <p>Remove white or textured backgrounds and export transparent PNG.</p>
          <div class="tool-hover-preview" aria-hidden="true">
            <div class="preview-mock before">
              <span>Before</span>
            </div>
            <div class="preview-mock after">
              <span>After</span>
            </div>
          </div>
          <a class="download" href="/tools/remove-bg">Open Tool</a>
        </article>

        <article class="card tool-card">
          <h2>YouTube to MP3</h2>
          <p>Paste a YouTube link and prepare MP3 conversion flow.</p>
          <a class="download" href="/tools/youtube-mp3">Open Tool</a>
        </article>
      </section>

      <footer class="legal">
        <a href="/privacy">Privacy</a>
        <span>|</span>
        <a href="/terms">Terms</a>
      </footer>
    </main>
  </body>
</html>
